name: release

run-name: "release ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            zigbuild: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            zigbuild: true
          - target: aarch64-apple-darwin
            os: macos-latest
            zigbuild: false
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install Zig
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v2

      - name: Install libudev for target (re_gamepad/gilrs, new in Rerun 0.34)
        if: contains(matrix.target, 'unknown-linux')
        run: |
          set -eux
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture arm64
            sudo sed -i 's/^Signed-By:/Architectures: amd64\nSigned-By:/' /etc/apt/sources.list.d/ubuntu.sources
            printf 'Types: deb\nURIs: http://ports.ubuntu.com/ubuntu-ports/\nSuites: noble noble-updates noble-security\nComponents: main universe\nArchitectures: arm64\nSigned-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg\n' | sudo tee /etc/apt/sources.list.d/arm64-ports.sources
            sudo apt-get update
            sudo apt-get install -y libudev-dev:arm64
          else
            sudo apt-get update
            sudo apt-get install -y libudev-dev
          fi

      - name: Build (zigbuild)
        if: matrix.zigbuild
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '/usr/lib/x86_64-linux-gnu/pkgconfig' }}
        run: cargo zigbuild --release --target ${{ matrix.target }}.2.35

      - name: Build (native)
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="rewire-viewer-${VERSION}-${{ matrix.target }}.tar.gz"
          tar czf "${ARCHIVE}" -C "target/${{ matrix.target }}/release" rewire-viewer
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: rewire-viewer-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  build-wasm:
    name: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.117

      - name: Install LLVM tools
        run: sudo apt-get update && sudo apt-get install -y llvm clang

      - name: Install binaryen
        run: |
          curl -sSL https://github.com/WebAssembly/binaryen/releases/download/version_130/binaryen-version_130-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-version_130/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32

      - name: Build WASM
        env:
          AR_wasm32_unknown_unknown: llvm-ar
          CC_wasm32_unknown_unknown: clang
        run: cargo build --lib --target wasm32-unknown-unknown --release --no-default-features

      - name: Generate JS bindings
        run: |
          wasm-bindgen target/wasm32-unknown-unknown/release/rewire_viewer.wasm \
            --target web --out-dir web/

      - name: Optimize WASM (wasm-opt -Oz)
        run: wasm-opt -Oz web/rewire_viewer_bg.wasm -o web/rewire_viewer_bg.wasm

      - uses: actions/upload-artifact@v7
        with:
          name: rewire-viewer-wasm
          path: |
            web/index.html
            web/rewire_viewer.js
            web/rewire_viewer_bg.wasm

  release:
    name: github-release
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: artifacts/*
          generate_release_notes: false

  deploy-wasm:
    name: deploy-wasm
    needs: [build-wasm, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: rewire-viewer-wasm
          path: web

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload to R2
        run: |
          wrangler r2 object put rewire-viewer/index.html --file web/index.html --content-type "text/html" --remote
          wrangler r2 object put rewire-viewer/rewire_viewer.js --file web/rewire_viewer.js --content-type "application/javascript" --remote
          wrangler r2 object put rewire-viewer/rewire_viewer_bg.wasm --file web/rewire_viewer_bg.wasm --content-type "application/wasm" --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
